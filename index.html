<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>RTMS / REC – ROOT</title>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
</head>
<body>

<h1>RTMS – REC Massstation</h1>

<p>4‑Achse: <span id="a4">…</span></p>
<p>12‑Achse: <span id="a12">…</span></p>
<p>48‑Achse: <span id="a48">…</span></p>
<p>360°: <span id="a360">…</span></p>

<p>
  <a id="link8472" href="#">SPECIES 8472 – 48igkeits‑Raum betreten</a>
</p>

<script>
fetch("borg.yml")
  .then(r => r.text())
  .then(t => {
    const y = jsyaml.load(t);

    const rt = y.rtms || {};
    document.getElementById("a4").textContent   = rt["4"]   || "-";
    document.getElementById("a12").textContent  = rt["12"]  || "-";
    document.getElementById("a48").textContent  = rt["48"]  || "-";
    document.getElementById("a360").textContent = rt["360"] || "-";

    const s8472 = y.species && y.species["8472"];
    if (s8472 && s8472.active) {
      document.getElementById("link8472").href = s8472.link;
    } else {
      document.getElementById("link8472").textContent = "SPECIES 8472 nicht aktiv";
    }
  });
</script>

</body>
</html>
