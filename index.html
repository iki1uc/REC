<script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>

<script>
async function AUSWERTUNG() {

  const borgRaw = await fetch("borg.yml").then(r => r.text());
  const borg = jsyaml.load(borgRaw);

  const out = {
    borg: borg.rtms || {},
    s8472: borg.species?.["8472"] || {},
    human: "active",
    sonne: "XX88",
    erde: "1.0",
    sonne2: "PI",
    raum48: "offen"
  };

  // Ergebnis anzeigen
  document.getElementById("borg4").textContent   = out.borg["4"];
  document.getElementById("borg12").textContent  = out.borg["12"];
  document.getElementById("borg48").textContent  = out.borg["48"];
  document.getElementById("borg360").textContent = out.borg["360"];

  document.getElementById("s8472").textContent   = out.s8472.active ? "aktiv" : "inaktiv";
  document.getElementById("terrain").textContent = out.s8472.terrain || "1";

  document.getElementById("human").textContent   = out.human;
  document.getElementById("sonne").textContent   = out.sonne;
  document.getElementById("erde").textContent    = out.erde;
  document.getElementById("sonne2").textContent  = out.sonne2;

  document.getElementById("raum48").textContent  = out.raum48;
}

AUSWERTUNG();
</script>
